name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-20.04, macos-latest, windows-latest ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21'

      - name: Install & Bundle mavp2p (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p resources/bin
          GOBIN="$(pwd)/resources/bin" go install github.com/bluenviron/mavp2p@latest

      - name: Install & Bundle mavp2p (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/bin
          $env:GOBIN = "$(Get-Location)/resources/bin"
          go install github.com/bluenviron/mavp2p@latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package with PyInstaller
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          pyinstaller mint.spec

      - name: Zip Artifact (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          zip -r mint-${{ matrix.os }}.zip mint/

      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/mint -DestinationPath dist/mint-windows-latest.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mint-${{ matrix.os }}-build
          path: |
            dist/*.zip
          retention-days: 7
